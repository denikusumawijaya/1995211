<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutoring by Deni</title>
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --sidebar-bg: #1E293B;
            --sidebar-text: #CBD5E1;
            --sidebar-active: #4F46E5;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --success: #10B981;
            --error: #EF4444;
            --border: #E5E7EB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text-main); }
        
        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; text-align: center; }
        .sidebar-header h2 { font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .sidebar-header p { font-size: 0.8rem; color: var(--primary); font-weight: bold; }
        #nav-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .nav-item:hover { background: #334155; }
        .nav-item.active { background: #334155; border-left-color: var(--primary); color: #fff; }
        .nav-duration { font-size: 0.7rem; background: #475569; padding: 2px 6px; border-radius: 4px; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; padding: 20px 40px; overflow: hidden; }
        .progress-container { margin-bottom: 20px; }
        .progress-bar-bg { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; border-radius: 4px; }
        .progress-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; text-align: right; }

        /* Slide System */
        #slide-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .slide { display: none; width: 100%; max-width: 800px; animation: fadeIn 0.3s ease; }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-nav { background: var(--primary); color: white; }
        .btn-nav:hover { background: var(--primary-hover); }
        .btn-check { background: var(--success); color: white; font-size: 0.9rem; }
        .btn-check:hover { background: #059669; }
        .btn-reset { background: var(--border); color: var(--text-main); font-size: 0.9rem; margin-left: 10px; }
        .btn-reset:hover { background: #D1D5DB; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; width: 100%; }

        /* Theory & Questions */
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid var(--border); }
        .theory-title { font-size: 1.1rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .theory-content { line-height: 1.6; }
        .translation { font-size: 0.85rem; color: var(--text-muted); font-style: italic; margin-top: 5px; }
        
        .question-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .q-text { font-size: 1.05rem; margin-bottom: 15px; font-weight: 500; }
        .q-input { margin: 15px 0; }
        .q-input select, .q-input input[type="text"] { padding: 8px; border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 300px; font-size: 1rem; }
        .q-input input[type="radio"], .q-input input[type="checkbox"] { margin-right: 8px; }
        .radio-group label, .checkbox-group label { display: block; margin-bottom: 8px; cursor: pointer; }
        
        .feedback { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; font-size: 0.9rem; }
        .feedback.correct { background: #D1FAE5; color: #065F46; border: 1px solid #10B981; display: block; }
        .feedback.incorrect { background: #FEE2E2; color: #991B1B; border: 1px solid #EF4444; display: block; }
        .feedback-title { font-weight: bold; margin-bottom: 5px; }
        .explanation { background: #EFF6FF; color: #1E40AF; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #3B82F6; }

        /* Homepage specific */
        .home-icon { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        .home-title { font-size: 2rem; font-weight: bold; color: var(--text-main); margin-bottom: 5px; }
        .home-subtitle { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-square-root-variable"></i> Math Tutoring</h2>
        <p>by Deni</p>
    </div>
    <div id="nav-list">
        <!-- Rendered by JS -->
    </div>
</div>

<!-- Main Content -->
<div id="main">
    <div class="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">0 / 0</div>
    </div>
    
    <div id="slide-container">

    </div>

    <div class="nav-buttons">
        <button class="btn btn-nav" id="btn-prev" onclick="navSlide(-1)"><i class="fas fa-arrow-left"></i> Previous</button>
        <button class="btn btn-nav" id="btn-next" onclick="navSlide(1)">Next <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

                icon: "fas fa-brain",
                content: `
                    <p>Phenomenal work! You successfully synthesized three distinct areas of algebra. Remember the 3 key rules:</p>
                    <p class="translation">Luar biasa! Kamu berhasil mensintesis tiga area aljabar yang berbeda. Ingat 3 aturan kunci:</p>
                    <ol>
                        <li>When in doubt, <strong>change everything to the same base</strong>. (Ketika ragu, ubah semuanya ke basis yang sama).</li>
                        <li>Need to solve a log? <strong>Switch to exponential form</strong>. (Perlu menyelesaikan log? Ubah ke bentuk eksponensial).</li>
                        <li>Always <strong>check for extraneous solutions</strong> against the domain! (Selalu periksa solusi extraneous terhadap domain!).</li>
                    </ol>
                `
            }
        ]
    }
];

// ==========================================
// CORE ENGINE
// ==========================================
let currentSectionIdx = 0;
let currentSlideIdx = 0;
window.studentAnswers = {};

function init() {
    renderSidebar();
    loadSection(0);
}

function renderSidebar() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = '';
    appData.forEach((sec, idx) => {
        const div = document.createElement('div');
        div.className = `nav-item ${idx === currentSectionIdx ? 'active' : ''}`;
        div.onclick = () => loadSection(idx);
        div.innerHTML = `<span>${sec.title}</span> ${sec.duration ? `<span class="nav-duration">${sec.duration}</span>` : ''}`;
        nav.appendChild(div);
    });
}

function loadSection(idx) {
    currentSectionIdx = idx;
    currentSlideIdx = 0;
    renderSidebar();
    renderSlides();
}

function renderSlides() {
    const container = document.getElementById('slide-container');
    container.innerHTML = '';
    const sec = appData[currentSectionIdx];

    if (sec.type === 'home') {
        container.innerHTML = `
            <div class="slide active" style="text-align: center;">
                <i class="fas fa-infinity home-icon"></i>
                <h1 class="home-title">Math Tutoring by Deni</h1>
                <h2 class="home-subtitle">Review and Consolidation (Exponents, Logs, & Surds)</h2>
                <p class="translation">Tinjauan dan Konsolidasi (Eksponen, Logaritma, & Akar)</p>
                <br><br>
                <button class="btn btn-nav" onclick="loadSection(1)">Start Lesson <i class="fas fa-arrow-right"></i></button>
            </div>`;
        updateProgress();
        return;
    }

    sec.slides.forEach((slide, idx) => {
        const div = document.createElement('div');
        div.className = `slide ${idx === currentSlideIdx ? 'active' : ''}`;
        div.id = `slide-${idx}`;
        
        if(slide.type === 'theory') {
            div.innerHTML = renderTheory(slide);
        } else {
            div.innerHTML = renderQuestion(slide, idx);
        }
        container.appendChild(div);
    });

    // ADD ASSESSMENT RESULT SLIDE AT THE END IF IT'S AN ASSESSMENT
    if(sec.isAssessment) {
        const resultIdx = sec.slides.length;
        const resultDiv = document.createElement('div');
        resultDiv.className = `slide ${currentSlideIdx === resultIdx ? 'active' : ''}`;
        resultDiv.id = `slide-${resultIdx}`;
        resultDiv.innerHTML = `
            <div class="card" style="text-align: center;">
                <i class="fas fa-flag-checkered" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
                <h2 style="margin-bottom: 20px;">Assessment Complete!</h2>
                <button class="btn btn-nav" onclick="showResultUI(${currentSectionIdx})" style="margin-bottom: 20px;"><i class="fas fa-calculator"></i> Calculate Score</button>
                
                <div id="score-display-${currentSectionIdx}" style="display:none; margin-top: 20px; text-align: left;">
                    <h3 style="text-align: center; color: var(--success); margin-bottom: 20px;">Score: <span id="score-val-${currentSectionIdx}"></span></h3>
                    <div style="background: #F9FAFB; padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Student Name:</label>
                        <input type="text" id="report-name" style="width:100%; padding:8px; margin-bottom:15px; border:1px solid var(--border); border-radius:4px;">
                        
                        <label style="font-weight:bold; display:block; margin-bottom:5px;">Date:</label>
                        <input type="date" id="report-date" style="width:100%; padding:8px; margin-bottom:20px; border:1px solid var(--border); border-radius:4px;">
                        
                        <button class="btn btn-nav" onclick="generateReport(${currentSectionIdx})" style="width:100%;"><i class="fas fa-print"></i> Generate & Print Report</button>
                    </div>
                </div>
            </div>`;
        container.appendChild(resultDiv);
    }

    updateProgress();
    renderMath();
}

function renderTheory(slide) {
    return `
        <div class="card">
            <div class="theory-title"><i class="${slide.icon}"></i> ${slide.title}</div>
            <p class="translation">${slide.title_id}</p>
            <div class="theory-content">${slide.content}</div>
        </div>`;
}

function renderQuestion(slide, idx) {
    let inputHtml = '';
    const qId = `q-${currentSectionIdx}-${idx}`;

    if (slide.type === 'q-fill') {
        inputHtml = `<div class="q-input"><input type="text" id="${qId}" autocomplete="off"></div>`;
    } 
    else if (slide.type === 'q-mcq') {
        inputHtml = `<div class="q-input radio-group">`;
        slide.options.forEach((opt, i) => {
            inputHtml += `<label><input type="radio" name="${qId}" value="${i}"> <span class="opt-text">${opt}</span></label>`;
        });
        inputHtml += `</div>`;
    }
    else if (slide.type === 'q-dropdown') {
        inputHtml = `<div class="q-input"><select id="${qId}">`;
        inputHtml += `<option value="-1">-- Select --</option>`;
        slide.options.forEach((opt, i) => {
            inputHtml += `<option value="${i}">${opt}</option>`;
        });
        inputHtml += `</select></div>`;
    }
    else if (slide.type === 'q-matching') {
        inputHtml = `<div class="q-input">`;
        slide.pairs.forEach((pair, i) => {
            inputHtml += `<div style="margin-bottom:10px; display:flex; align-items:center; gap:10px;">
                <span style="flex:1;">${pair}</span>
                <select id="${qId}-${i}" style="flex:1;">
                    <option value="-1">-- Select --</option>`;
            slide.options.forEach((opt, j) => {
                inputHtml += `<option value="${j}">${opt}</option>`;
            });
            inputHtml += `</select></div>`;
        });
        inputHtml += `</div>`;
    }
    // NEW: Checkbox Type
    else if (slide.type === 'q-checkbox') {
        inputHtml = `<div class="q-input checkbox-group">`;
        slide.options.forEach((opt, i) => {
            inputHtml += `<label><input type="checkbox" name="${qId}" value="${i}"> <span class="opt-text">${opt}</span></label>`;
        });
        inputHtml += `</div>`;
    }
    // NEW: Order Type
    else if (slide.type === 'q-order') {
        inputHtml = `<div class="q-input">`;
        const numItems = slide.items.length;
        const optionsHtml = Array.from({length: numItems}, (_, i) => `<option value="${i}">${i+1}</option>`).join('');
        slide.items.forEach((item, i) => {
            inputHtml += `<div style="margin-bottom:10px; display:flex; align-items:center; gap:10px;">
                <select id="${qId}-${i}" style="width: 60px;">${optionsHtml}</select>
                <span style="flex:1;">${item}</span>
            </div>`;
        });
        inputHtml += `</div>`;
    }

    return `
        <div class="question-box">
            <div class="q-text">${slide.q}</div>
            ${inputHtml}
            <div style="margin-top:15px;">
                <button class="btn btn-check" onclick="checkAnswer('${qId}', '${slide.type}', ${JSON.stringify(slide.ans).replace(/"/g, "'")})"><i class="fas fa-check"></i> Check</button>
                <button class="btn btn-reset" onclick="resetAnswer('${qId}', '${slide.type}', ${slide.pairs ? slide.pairs.length : (slide.items ? slide.items.length : 0)}, ${slide.options ? slide.options.length : 0})"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="fb-${qId}" class="feedback"></div>
        </div>`;
}

window.checkAnswer = function(qId, type, ans) {
    let isCorrect = false;

    if (type === 'q-fill') {
        const userAns = document.getElementById(qId).value.trim();
        isCorrect = userAns.toLowerCase() === ans.toLowerCase();
    } 
    else if (type === 'q-mcq' || type === 'q-dropdown') {
        const el = document.querySelector(`[name="${qId}"]:checked`) || document.getElementById(qId);
        const val = el ? el.value : "-1";
        isCorrect = val == ans;
    }
    else if (type === 'q-matching') {
        isCorrect = true;
        for(let i=0; i<ans.length; i++) {
            const val = document.getElementById(`${qId}-${i}`).value;
            if(val != ans[i]) isCorrect = false;
        }
    }
    else if (type === 'q-checkbox') {
        const checkboxes = document.getElementsByName(qId);
        const selected = [];
        checkboxes.forEach(cb => { if(cb.checked) selected.push(parseInt(cb.value)); });
        selected.sort((a,b) => a-b);
        const correctAns = [...ans].sort((a,b) => a-b);
        isCorrect = JSON.stringify(selected) === JSON.stringify(correctAns);
    }
    else if (type === 'q-order') {
        isCorrect = true;
        for(let i=0; i<ans.length; i++) {
            const val = document.getElementById(`${qId}-${i}`).value;
            if(parseInt(val) !== ans[i]) isCorrect = false;
        }
    }

    // SAVE ANSWER FOR REPORT
    window.studentAnswers[qId] = isCorrect;

    const fbEl = document.getElementById(`fb-${qId}`);
    const sec = appData[currentSectionIdx];
    const slide = sec.slides[parseInt(qId.split('-')[2])];
    
    fbEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    fbEl.innerHTML = `
        <div class="feedback-title">${isCorrect ? '<i class="fas fa-check-circle"></i> Correct!' : '<i class="fas fa-times-circle"></i> Incorrect!'}</div>
        <div class="explanation"><strong>Explanation / Penjelasan:</strong><br>${slide.exp}</div>
    `;
    renderMath();
};

window.resetAnswer = function(qId, type, itemCount, optCount) {
    if (type === 'q-fill') {
        document.getElementById(qId).value = '';
    } 
    else if (type === 'q-mcq') {
        const radios = document.getElementsByName(qId);
        radios.forEach(r => r.checked = false);
    }
    else if (type === 'q-dropdown') {
        document.getElementById(qId).selectedIndex = 0;
    }
    else if (type === 'q-matching') {
        for(let i=0; i<itemCount; i++) document.getElementById(`${qId}-${i}`).selectedIndex = 0;
    }
    // NEW: Checkbox Reset
    else if (type === 'q-checkbox') {
        const checkboxes = document.getElementsByName(qId);
        checkboxes.forEach(cb => cb.checked = false);
    }
    // NEW: Order Reset
    else if (type === 'q-order') {
        for(let i=0; i<itemCount; i++) document.getElementById(`${qId}-${i}`).selectedIndex = 0;
    }
    
    document.getElementById(`fb-${qId}`).innerHTML = '';
    document.getElementById(`fb-${qId}`).className = 'feedback';
};

// Navigation
function navSlide(dir) {
    const sec = appData[currentSectionIdx];
    if(sec.type === 'home') { loadSection(1); return; }
    
    let nextIdx = currentSlideIdx + dir;
    if(nextIdx < 0) {
        if(currentSectionIdx > 0) loadSection(currentSectionIdx - 1); // Go to end of prev section? For simplicity, go to start.
        return;
    }
    if(nextIdx >= sec.slides.length) {
        if(currentSectionIdx < appData.length - 1) loadSection(currentSectionIdx + 1);
        return;
    }
    currentSlideIdx = nextIdx;
    
    document.querySelectorAll('.slide').forEach((s, i) => {
        s.className = 'slide' + (i === currentSlideIdx ? ' active' : '');
    });
    updateProgress();
}

function updateProgress() {
    const sec = appData[currentSectionIdx];
    if(sec.type === 'home') {
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('progress-text').innerText = '';
        return;
    }
    const total = sec.slides.length;
    const pct = ((currentSlideIdx + 1) / total) * 100;
    document.getElementById('progress-fill').style.width = `${pct}%`;
    document.getElementById('progress-text').innerText = `${currentSlideIdx + 1} / ${total}`;
}

function renderMath() {
    renderMathInElement(document.body, {
        delimiters: [
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ]
    });
}

window.onload = init;

function calculateScore(sectionIdx) {
    const sec = appData[sectionIdx];
    let score = 0;
    let totalQ = 0;
    sec.slides.forEach((slide, idx) => {
        if(slide.type !== 'theory') {
            totalQ++;
            const qId = `q-${sectionIdx}-${idx}`;
            if(window.studentAnswers[qId]) score++;
        }
    });
    return { score, totalQ };
}

window.showResultUI = function(sectionIdx) {
    const { score, totalQ } = calculateScore(sectionIdx);
    document.getElementById(`score-val-${sectionIdx}`).innerText = `${score} / ${totalQ}`;
    document.getElementById(`score-display-${sectionIdx}`).style.display = 'block';
}

window.generateReport = function(sectionIdx) {
    const sec = appData[sectionIdx];
    const name = document.getElementById('report-name').value || 'Anonymous';
    const date = document.getElementById('report-date').value || new Date().toISOString().slice(0,10);
    
    let score = 0;
    let totalQ = 0;
    let tableRows = "";

    sec.slides.forEach((slide, idx) => {
        if(slide.type !== 'theory') {
            totalQ++;
            const qId = `q-${sectionIdx}-${idx}`;
            const isCorrect = window.studentAnswers[qId] || false;
            if(isCorrect) score++;
            
            const qText = slide.q.replace(/<[^>]*>?/gm, ''); // Strip HTML for report
            const correctAns = Array.isArray(slide.ans) ? slide.ans.join(', ') : slide.ans;
            
            tableRows += `<tr>
                <td style="border:1px solid #ddd; padding:8px;">${totalQ}</td>
                <td style="border:1px solid #ddd; padding:8px;">${qText}</td>
                <td style="border:1px solid #ddd; padding:8px;">${isCorrect ? 'Correct' : 'Incorrect/Blank'}</td>
                <td style="border:1px solid #ddd; padding:8px;">${correctAns}</td>
                <td style="border:1px solid #ddd; padding:8px; text-align:center;">${isCorrect ? '✓' : '✗'}</td>
            </tr>`;
        }
    });

    const html = `
        <html>
        <head><title>Assessment Report</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; color: #1F2937; }
            h1 { color: #4F46E5; border-bottom: 2px solid #4F46E5; padding-bottom: 10px; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th { background-color: #4F46E5; color: white; border: 1px solid #ddd; padding: 8px; text-align: left; }
            .header-info { margin-bottom: 20px; line-height: 1.8; font-size: 1.1rem; background: #F3F4F6; padding: 15px; border-radius: 8px;}
            .signature { margin-top: 60px; font-weight: bold; }
        </style>
        </head>
        <body>
            <h1>ASSESSMENT RESULT</h1>
            <div class="header-info">
                <strong>Name:</strong> ${name}<br>
                <strong>Date:</strong> ${date}<br>
                <strong>Topic:</strong> Review and Consolidation (Exponents, Logs, & Surds)<br>
                <strong>Assessment Group:</strong> ${sec.title}<br>
                <strong>Score:</strong> ${score} / ${totalQ}
            </div>
            <table>
                <thead>
                    <tr><th>No</th><th>Question</th><th>Student Answer</th><th>Correct Answer</th><th>Note (v/x)</th></tr>
                </thead>
                <tbody>
                    ${tableRows}
                </tbody>
            </table>
            <div class="signature">
                Checked by,<br><br>Deni
            </div>
        </body>
        </html>
    `;

    const newTab = window.open('', '_blank');
    newTab.document.write(html);
    newTab.document.close();
};
</script>
