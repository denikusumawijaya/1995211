<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH TUTORING by Deni - Quadratic Equations</title>
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --danger: #ff4b4b;
            --warning: #ffc800;
            --bg: #131f24;
            --bg-card: #1a2e35;
            --text-main: #ffffff;
            --text-sub: #8b9ea7;
            --border: #37464f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background-color: var(--bg-card);
            border-right: 2px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-align: center;
            color: var(--primary);
        }

        #sidebar .topic {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            text-align: center;
        }

        .path-node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--border);
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            z-index: 2;
        }

        .path-node::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 40px;
            background-color: var(--border);
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .path-node:first-child::before {
            display: none;
        }

        .path-node.active {
            border-color: var(--secondary);
            background-color: var(--bg);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(28, 176, 246, 0.5);
        }

        .path-node.completed {
            background-color: var(--primary);
            border-color: var(--primary-dark);
        }

        .path-node i {
            color: white;
            font-size: 1.2rem;
        }

        .node-tooltip {
            position: absolute;
            left: 60px;
            background-color: var(--bg);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid var(--border);
        }

        .path-node:hover .node-tooltip {
            opacity: 1;
        }

        #reset-all-btn {
            margin-top: auto;
            padding: 10px 20px;
            background-color: var(--danger);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 4px solid #cc3b3b;
            transition: all 0.2s;
        }

        #reset-all-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid #cc3b3b;
        }

        /* Main Content Area */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-container {
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Theory Card */
        .theory-card {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
        }

        .theory-card h3 {
            color: var(--secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theory-card p {
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .translation {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-style: italic;
            display: block;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        .math-block {
            background-color: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            font-size: 1.2rem;
        }

        /* Exercise Card */
        .exercise-card {
            background-color: var(--bg-card);
            border: 2px solid var(--warning);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .exercise-card h4 {
            color: var(--warning);
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .math-input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background-color: var(--bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .math-input:focus {
            border-color: var(--secondary);
        }

        .check-btn {
            padding: 12px 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 4px solid var(--primary-dark);
            transition: all 0.2s;
        }

        .check-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid var(--primary-dark);
        }

        .check-btn:disabled {
            background-color: var(--border);
            border-bottom-color: var(--border);
            cursor: not-allowed;
        }

        /* Feedback */
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .feedback.correct {
            background-color: rgba(88, 204, 2, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .feedback.incorrect {
            background-color: rgba(255, 75, 75, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .explanation-details {
            margin-top: 10px;
            background-color: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
        }

        .explanation-details summary {
            cursor: pointer;
            font-weight: bold;
        }

        .explanation-details p {
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 25px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 4px solid #1390c7;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.reset-step-btn {
            background-color: var(--warning);
            border-bottom-color: #cc9f00;
            color: black;
        }

        .nav-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* Print Styles for Assignment */
        #print-area {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block;
                background: white;
                color: black;
                font-family: Arial, sans-serif;
                font-size: 10pt;
                padding: 20mm;
            }
            #print-area table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }
            #print-area th, #print-area td {
                border: 1px solid black;
                padding: 4px;
                text-align: left;
            }
            #print-area h2 {
                margin-bottom: 10px;
            }
            .print-info {
                margin-bottom: 10px;
            }
            .print-footer {
                margin-top: 30px;
                text-align: right;
            }
        }

        .svg-container {
            text-align: center;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div id="sidebar">
        <h2>MATH TUTORING by Deni</h2>

        <button id="reset-all-btn" onclick="resetAllProgress()"><i class="fas fa-trash-alt"></i> Reset All Progress</button>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="section-container" id="content-area">
            <!-- Dynamic Content Goes Here -->
        </div>

    <!-- Hidden Print Area -->
    <div id="print-area"></div>

    <!-- KaTeX JS -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <script>
        // --- DATA STRUCTURE ---
        const lessonData = [
            { id: 'home', title: 'Home', icon: 'fa-house', time: '00:00' },
            { id: 'section1', title: 'Spiral Review Warm-up', icon: 'fa-rotate', time: '00:00-00:10', steps: [] },
            { id: 'section2', title: 'Introduction & Real-World', icon: 'fa-rocket', time: '00:10-00:15', steps: [] },
            { id: 'section3', title: 'Review of Prior Knowledge', icon: 'fa-brain', time: '00:15-00:20', steps: [] },
            { id: 'section4', title: 'Problem Introduction', icon: 'fa-square-root-variable', time: '00:20-00:30', steps: [] },
            { id: 'section5', title: 'Guided Practice', icon: 'fa-hand-holding-heart', time: '00:30-00:45', steps: [] },
            { id: 'section6', title: 'Independent Practice', icon: 'fa-person-running', time: '00:50-01:00', steps: [] },
            { id: 'assign1', title: 'Assignment 1', icon: 'fa-pen', time: '', steps: [] },
            { id: 'assign2', title: 'Assignment 2', icon: 'fa-pen', time: '', steps: [] },
            { id: 'assign3', title: 'Assignment 3', icon: 'fa-pen', time: '', steps: [] },
            { id: 'assign4', title: 'Assignment 4', icon: 'fa-pen', time: '', steps: [] },
            { id: 'assign5', title: 'Assignment 5', icon: 'fa-pen', time: '', steps: [] },
            { id: 'consolidation', title: 'Consolidation & Reflection', icon: 'fa-flag-checkered', time: '01:00-01:05' }
        ];

        // --- SECTION 1 CONTENT ---
        lessonData[1].steps = [
            {
                type: 'theory',
                content: `
                    <p>Before we dive into today's new challenge, let's sharpen your tools with a quick brain warm-up on logarithms. <span class="translation">Sebelum kita menyelami tantangan baru hari ini, mari asah alatmu dengan pemanasan otak cepat tentang logaritma.</span></p>
                    <p>A logarithm is the inverse operation of exponentiation. If $b^y = x$, then $\\log_b x = y$. <span class="translation">Logaritma adalah operasi invers dari perpangkatan. Jika $b^y = x$, maka $\\log_b x = y$.</span></p>
                    <div class="math-block">$\\log_b x = y \\iff b^y = x$</div>
                `
            },
            {
                type: 'exercise',
                question: 'Evaluate: $\\log_2 8 = ...$ <span class="translation">Evaluasi: $\\log_2 8 = ...$</span>',
                answer: ['3'],
                explanation: 'Because $2^3 = 8$, then $\\log_2 8 = 3$. <span class="translation">Karena $2^3 = 8$, maka $\\log_2 8 = 3$.</span>'
            },
            {
                type: 'exercise',
                question: 'Evaluate: $\\log_3 81 = ...$ <span class="translation">Evaluasi: $\\log_3 81 = ...$</span>',
                answer: ['4'],
                explanation: 'Because $3^4 = 81$, then $\\log_3 81 = 4$. <span class="translation">Karena $3^4 = 81$, maka $\\log_3 81 = 4$.</span>'
            },
            {
                type: 'exercise',
                question: 'Write $5^2 = 25$ in logarithmic form. <span class="translation">Tuliskan $5^2 = 25$ dalam bentuk logaritma.</span>',
                answer: ['log_5 25 = 2', 'log_5(25)=2'],
                explanation: 'The logarithmic form of $a^b = c$ is $\\log_a c = b$. So the answer is $\\log_5 25 = 2$. <span class="translation">Bentuk logaritma dari $a^b = c$ adalah $\\log_a c = b$. Jadi jawabannya $\\log_5 25 = 2$.</span>'
            },
            {
                type: 'theory',
                content: `
                    <p>When the calculator base is not available, we use the <strong>Change of Base Formula</strong>. <span class="translation">Saat basis kalkulator tidak tersedia, kita menggunakan Rumus Perubahan Basis.</span></p>
                    <div class="math-block">$\\log_a b = \\frac{\\log_c b}{\\log_c a}$</div>
                    <p>Usually, we use base 10 ($c=10$) which is often simply written as $\\log$ on a calculator. <span class="translation">Biasanya kita menggunakan basis 10 ($c=10$) yang sering ditulis sebagai $\\log$ saja di kalkulator.</span></p>
                `
            },
            {
                type: 'exercise',
                question: 'Evaluate $\\log_8 32$ using change of base. The result is $\\frac{p}{q}$. What is $p+q$ if $p/q$ is simplified? <span class="translation">Evaluasi $\\log_8 32$ menggunakan perubahan basis. Hasilnya adalah $\\frac{p}{q}$. Berapa nilai $p+q$ jika $p/q$ sudah disederhanakan?</span>',
                answer: ['8'],
                explanation: '$\\log_8 32 = \\frac{\\log 32}{\\log 8} = \\frac{\\log 2^5}{\\log 2^3} = \\frac{5}{3}$. So $p=5, q=3$, then $p+q = 8$. <span class="translation">$\\log_8 32 = \\frac{\\log 32}{\\log 8} = \\frac{\\log 2^5}{\\log 2^3} = \\frac{5}{3}$. Jadi $p=5, q=3$, maka $p+q = 8$.</span>'
            },
            {
                type: 'exercise',
                question: 'Write $\\log_4 8$ in the form of base 10 logarithm division! <span class="translation">Tuliskan $\\log_4 8$ dalam bentuk pembagian logaritma basis 10!</span>',
                answer: ['log 8 / log 4', 'log(8)/log(4)', 'log8/log4'],
                explanation: 'Using the change of base formula: $\\log_4 8 = \\frac{\\log 8}{\\log 4}$. <span class="translation">Menggunakan rumus perubahan basis: $\\log_4 8 = \\frac{\\log 8}{\\log 4}$.</span>'
            },
            {
                type: 'exercise',
                question: 'True or False: $\\log_5 10 = \\frac{\\ln 10}{\\ln 5}$ <span class="translation">Benar atau Salah: $\\log_5 10 = \\frac{\\ln 10}{\\ln 5}$</span>',
                answer: ['true', 'benar'],
                explanation: 'True! The base $c$ in the change of base formula can be any positive number, including base $e$ (ln). <span class="translation">Benar! Basis $c$ pada rumus perubahan basis bisa berupa bilangan positif apa pun, termasuk basis $e$ (ln).</span>'
            },
            {
                type: 'theory',
                content: `
                    <p>Next, we recall the <strong>Properties of Logarithms</strong>. <span class="translation">Selanjutnya, kita ingat Sifat-sifat Logaritma.</span></p>
                    <ul>
                        <li>Product: $\\log(xy) = \\log x + \\log y$</li>
                        <li>Quotient: $\\log(\\frac{x}{y}) = \\log x - \\log y$</li>
                        <li>Power: $\\log(x^n) = n \\log x$</li>
                    </ul>
                `
            },
            {
                type: 'exercise',
                question: 'Simplify: $\\log(x^3) - \\log(x)$ <span class="translation">Sederhanakan: $\\log(x^3) - \\log(x)$</span>',
                answer: ['2 log x', '2log(x)', '2logx', 'log(x^2)'],
                explanation: '$\\log(x^3) - \\log(x) = 3\\log x - 1\\log x = 2\\log x$. Or using quotient: $\\log(\\frac{x^3}{x}) = \\log(x^2) = 2\\log x$. <span class="translation">$\\log(x^3) - \\log(x) = 3\\log x - 1\\log x = 2\\log x$. Atau menggunakan pembagian: $\\log(\\frac{x^3}{x}) = \\log(x^2) = 2\\log x$.</span>'
            },
            {
                type: 'exercise',
                question: 'Expand $\\log(5ab^2)$ (Separate with + sign, e.g., log 5 + log a + ...) <span class="translation">Ekspansi $\\log(5ab^2)$ (Pisahkan dengan tanda +)</span>',
                answer: ['log 5 + log a + 2 log b', 'log5+loga+2logb'],
                explanation: '$\\log(5ab^2) = \\log 5 + \\log a + \\log(b^2) = \\log 5 + \\log a + 2\\log b$. <span class="translation">$\\log(5ab^2) = \\log 5 + \\log a + \\log(b^2) = \\log 5 + \\log a + 2\\log b$.</span>'
            },
            {
                type: 'exercise',
                question: 'Simplify: $2\\log 5 + \\log 4$ <span class="translation">Sederhanakan: $2\\log 5 + \\log 4$</span>',
                answer: ['2', 'log 100'],
                explanation: '$2\\log 5 + \\log 4 = \\log(5^2) + \\log 4 = \\log 25 + \\log 4 = \\log(25 \\times 4) = \\log 100 = 2$. <span class="translation">$2\\log 5 + \\log 4 = \\log(5^2) + \\log 4 = \\log 25 + \\log 4 = \\log(25 \\times 4) = \\log 100 = 2$.</span>'
            },
            {
                type: 'exercise',
                question: 'If $\\log 2 \\approx 0.301$ and $\\log 3 \\approx 0.477$, what is the value of $\\log 6$? <span class="translation">Jika $\\log 2 \\approx 0.301$ dan $\\log 3 \\approx 0.477$, berapa nilai $\\log 6$?</span>',
                answer: ['0.778'],
                explanation: '$\\log 6 = \\log(2 \\times 3) = \\log 2 + \\log 3 = 0.301 + 0.477 = 0.778$. <span class="translation">$\\log 6 = \\log(2 \\times 3) = \\log 2 + \\log 3 = 0.301 + 0.477 = 0.778$.</span>'
            }
        ];

        // --- SECTION 2 CONTENT ---
        lessonData[2].steps = [
            {
                type: 'theory',
                content: `
                    <p>Today, we transition to Quadratic Equations. We move from linear 'flat' math to 'curved' math that defines the physical world around us. <span class="translation">Hari ini, kita beralih ke Persamaan Kuadrat. Kita berpindah dari matematika 'datar' linear ke matematika 'melengkung' yang mendefinisikan dunia fisik di sekitar kita.</span></p>
                    <p>These paths aren't straight lines; they are curves called <strong>Parabolas</strong>. <span class="translation">Jalur-jalur ini bukanlah garis lurus; ini adalah kurva yang disebut Parabola.</span></p>
                    <div class="svg-container">
                        <svg width="200" height="100" viewBox="0 0 200 100">
                            <path d="M 10 90 Q 100 -20 190 90" fill="none" stroke="#1cb0f6" stroke-width="3"/>
                            <circle cx="10" cy="90" r="3" fill="#ffc800"/>
                            <circle cx="190" cy="90" r="3" fill="#ffc800"/>
                        </svg>
                    </div>
                `
            },
            {
                type: 'exercise',
                question: 'Which one represents a straight line shape? (Answer a or b) <br> a) $y = 3x + 2$ <br> b) $y = x^2$ <span class="translation">Manakah yang merupakan bentuk garis lurus? (Jawab a atau b)</span>',
                answer: ['a'],
                explanation: 'The equation $y = 3x + 2$ is a linear equation (power of 1) whose graph is a straight line. <span class="translation">Persamaan $y = 3x + 2$ adalah persamaan linear (pangkat 1) yang grafiknya berupa garis lurus.</span>'
            },
            {
                type: 'exercise',
                question: 'What trajectory will the equation $y = x^2 - 4$ form? <span class="translation">Persamaan $y = x^2 - 4$ akan membentuk lintasan apa?</span>',
                answer: ['parabola'],
                explanation: 'The presence of the $x^2$ term (power of two) makes the graph shaped like a parabola (curved). <span class="translation">Adanya suku $x^2$ (pangkat dua) membuat grafiknya berbentuk parabola (melengkung).</span>'
            },
            {
                type: 'exercise',
                question: 'True or False: Quadratic equations always produce a U-shaped graph or parabola. <span class="translation">Benar atau Salah: Persamaan kuadrat selalu menghasilkan grafik berbentuk huruf U atau parabola.</span>',
                answer: ['true', 'benar'],
                explanation: 'True, the graph of a quadratic function is always a parabola (like a U or an upside-down U). <span class="translation">Benar, grafik dari fungsi kuadrat selalu berbentuk parabola (seperti huruf U atau U terbalik).</span>'
            },
            {
                type: 'theory',
                content: `
                    <p>Imagine you are designing a suspension bridge or calculating the trajectory of a rocket. <span class="translation">Bayangkan kamu mendesain jembatan gantung atau menghitung lintasan roket.</span></p>
                    <p>The path of a basketball shot isn't a straight line, but forms a curve. The cables on a suspension bridge also form a parabola. <span class="translation">Lintasan tembakan bola basket bukan garis lurus, melainkan membentuk lengkungan. Kabel pada jembatan gantung juga membentuk parabola.</span></p>
                `
            },
            {
                type: 'exercise',
                question: 'The trajectory of a rocket shot upwards will form a... <span class="translation">Lintasan roket yang ditembakkan ke atas akan membentuk...</span>',
                answer: ['parabola'],
                explanation: 'The trajectory of an object thrown upwards and falling due to gravity forms a parabola. <span class="translation">Lintasan benda yang dilempar ke atas dan jatuh karena gravitasi membentuk parabola.</span>'
            },
            {
                type: 'exercise',
                question: 'On a suspension bridge, which part usually forms a parabola? <span class="translation">Pada jembatan gantung, bagian manakah yang biasanya membentuk parabola?</span>',
                answer: ['cable', 'cables', 'kabel', 'tali'],
                explanation: 'The main cables supporting the suspension bridge hang and form a parabola. <span class="translation">Kabel utama yang menyokong jembatan gantung menggantung dan membentuk parabola.</span>'
            },
            {
                type: 'exercise',
                question: 'Does the water trajectory from a fountain form a parabola? (Yes/No) <span class="translation">Apakah lintasan air dari air mancur membentuk parabola? (Ya/Tidak)</span>',
                answer: ['yes', 'ya'],
                explanation: 'Yes! Water coming out and pulled by gravity forms a parabolic trajectory. <span class="translation">Ya! Air yang keluar dan ditarik gravitasi membentuk lintasan parabola.</span>'
            },
            {
                type: 'theory',
                content: `
                    <p>The math behind these curves is the <strong>Quadratic Equation</strong>. <span class="translation">Matematika di balik kurva ini disebut Persamaan Kuadrat.</span></p>

        // --- STATE MANAGEMENT ---
        let currentState = {
            currentSectionIndex: 0,
            currentStepIndex: 0,
            answers: {},
            completedSteps: {}
        };

        function loadState() {
            const saved = localStorage.getItem('mathTutorState');
            if (saved) {
                currentState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('mathTutorState', JSON.stringify(currentState));
        }

        function resetAllProgress() {
            if(confirm("Are you sure you want to reset all progress? / Apakah kamu yakin ingin mereset semua kemajuan?")) {
                localStorage.removeItem('mathTutorState');
                currentState = {
                    currentSectionIndex: 0,
                    currentStepIndex: 0,
                    answers: {},
                    completedSteps: {}
                };
                renderPath();
                navigateTo(0, 0);
            }
        }

        // --- NAVIGATION & RENDERING ---
        function renderPath() {
            const container = document.getElementById('path-container');
            container.innerHTML = '';

            lessonData.forEach((section, index) => {
                const node = document.createElement('div');
                node.className = 'path-node';
                
                const isCompleted = currentState.completedSteps[section.id] === true;
                const isActive = index === currentState.currentSectionIndex;

                if (isCompleted) node.classList.add('completed');
                if (isActive) node.classList.add('active');

                node.innerHTML = `
                    <i class="fas ${section.icon}"></i>
                    <div class="node-tooltip">${section.title} ${section.time ? '('+section.time+')' : ''}</div>
                `;
                
                node.onclick = () => navigateTo(index, 0);
                container.appendChild(node);
            });
        }

        function navigateTo(sectionIndex, stepIndex) {
            currentState.currentSectionIndex = sectionIndex;
            currentState.currentStepIndex = stepIndex;
            saveState();
            renderPath();
            renderContent();
        }

        function renderContent() {
            const area = document.getElementById('content-area');
            const section = lessonData[currentState.currentSectionIndex];
            const stepIdx = currentState.currentStepIndex;

            if (section.id === 'home') {
                renderHome(area);
            } else if (section.id === 'consolidation') {
                renderConsolidation(area);
            } else if (section.id.startsWith('assign')) {
                renderAssignment(area, section, stepIdx);
            } else {
                renderSectionStep(area, section, stepIdx);
            }

            // Render Math
            renderMathInElement(area, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        }

        function renderConsolidation(area) {
            area.innerHTML = `
                <div class="theory-card">
                    <h3><i class="fas fa-flag-checkered"></i> Consolidation & Reflection <span class="translation">Konsolidasi & Refleksi</span></h3>
                    <p>Brilliant session! You've mastered how to take a complex curve and break it down into simple linear factors. <span class="translation">Sesi luar biasa! Kamu telah menguasai cara mengambil kurva yang kompleks dan membaginya menjadi faktor linier yang sederhana.</span></p>
                    <p>Remember, the roots are just the points where our path hits the ground. <span class="translation">Ingat, akar-akarnya hanyalah titik-titik di mana jalur kita menyentuh tanah.</span></p>
                    <p>Summary: Standard Form vs Factored Form <span class="translation">Ringkasan: Bentuk Standar vs Bentuk Faktor</span></p>
                    <div class="math-block">$ax^2 + bx + c = 0 \\iff a(x-r_1)(x-r_2) = 0$</div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" style="background-color: #58cc02; border-bottom-color: #46a302;" onclick="window.open('https://learn.algonova.id/login', '_blank')"><i class="fas fa-external-link-alt"></i> Open Algonova Dashboard</button>
                </div>
            `;
        }

        function renderSectionStep(area, section, stepIdx) {
            const step = section.steps[stepIdx];
            if(!step) {
                navigateTo(currentState.currentSectionIndex + 1, 0);
                return;
            }

            // FIX: Deklarasikan isChecked dan ansKey di level atas agar bisa diakses di bagian navigasi
            let isChecked = false;
            let ansKey = '';

            let html = `<h2>${section.title} <span class="translation" style="font-size: 0.9rem;">${section.time ? '('+section.time+')' : ''}</span></h2>`;

            if (step.type === 'theory') {
                html += `
                    <div class="theory-card">
                        <h3><i class="fas fa-book-open"></i> Theory ${stepIdx + 1} <span class="translation">Teori ${stepIdx + 1}</span></h3>
                        ${step.content}
                    </div>
                `;
            } else if (step.type === 'exercise') {
                ansKey = `${section.id}_step${stepIdx}`;
                const userAns = currentState.answers[ansKey] || '';
                isChecked = userAns !== '' && userAns !== undefined;
                const isCorrect = isChecked && checkAnswer(userAns, step.answer);

                html += `
                    <div class="exercise-card">
                        <h4><i class="fas fa-pencil-alt"></i> Exercise ${stepIdx + 1} <span class="translation">Latihan ${stepIdx + 1}</span></h4>
                        <p>${step.question}</p>
                        <div class="input-group">
                            <input type="text" class="math-input" id="input-${ansKey}" value="${userAns}" placeholder="Type your answer here..." onchange="handleInput('${ansKey}', this.value)" onkeydown="if(event.key === 'Enter') { event.preventDefault(); checkStep('${ansKey}', '${section.id}', ${stepIdx}); }" ${isChecked ? 'disabled' : ''}>
                            <button class="check-btn" onclick="checkStep('${ansKey}', '${section.id}', ${stepIdx})" ${isChecked ? 'disabled' : ''}>
                                ${isChecked ? 'Checked' : 'Check'}
                            </button>
                        </div>
                        <div class="feedback ${isChecked ? (isCorrect ? 'correct' : 'incorrect') : ''}" style="display: ${isChecked ? 'block' : 'none'}">
                            <strong>${isCorrect ? 'Correct!' : 'Incorrect'}</strong>
                            <details class="explanation-details">
                                <summary>View Explanation <span class="translation">Lihat Penjelasan</span></summary>
                                <p>${step.explanation}</p>
                            </details>
                        </div>
                    </div>
                `;
            }

            const totalSteps = section.steps.length;
            const isLastStep = stepIdx === totalSteps - 1;

            html += `
                <div class="nav-buttons">
                    <div>
                        ${stepIdx > 0 ? `<button class="nav-btn" onclick="navigateTo(${currentState.currentSectionIndex}, ${stepIdx - 1})"><i class="fas fa-arrow-left"></i> Back</button>` : ''}
                    </div>
                    <div style="display: flex; gap: 10px;">
                        ${isChecked ? `<button class="nav-btn reset-step-btn" onclick="resetStep('${ansKey}', '${section.id}', ${stepIdx})"><i class="fas fa-redo"></i> Reset</button>` : ''}
                        ${isLastStep ? 
                            `<button class="nav-btn" onclick="completeSection('${section.id}')">Complete Section <i class="fas fa-check"></i></button>` :
                            `<button class="nav-btn" onclick="navigateTo(${currentState.currentSectionIndex}, ${stepIdx + 1})">Next <i class="fas fa-arrow-right"></i></button>`
                        }
                    </div>
                </div>
            `;

            area.innerHTML = html;
        }

        function renderAssignment(area, section, stepIdx) {
            const step = section.steps[stepIdx];
            if(!step) {
                navigateTo(currentState.currentSectionIndex + 1, 0);
                return;
            }

            const ansKey = `${section.id}_step${stepIdx}`;
            const userAns = currentState.answers[ansKey] || '';
            const isChecked = userAns !== '' && userAns !== undefined;
            const isCorrect = isChecked && checkAnswer(userAns, step.answer);

            let html = `
                <h2>${section.title}</h2>
                <div class="exercise-card">
                    <h4>Question ${stepIdx + 1} / ${section.steps.length}</h4>
                    <p>${step.question}</p>
                    <div class="input-group">
                        <input type="text" class="math-input" id="input-${ansKey}" value="${userAns}" placeholder="Answer..." onchange="handleInput('${ansKey}', this.value)" onkeydown="if(event.key === 'Enter') { event.preventDefault(); checkStep('${ansKey}', '${section.id}', ${stepIdx}); }" ${isChecked ? 'disabled' : ''}>
                        <button class="check-btn" onclick="checkStep('${ansKey}', '${section.id}', ${stepIdx})" ${isChecked ? 'disabled' : ''}>
                            ${isChecked ? 'Checked' : 'Check'}
                        </button>
                    </div>
                    <div class="feedback ${isChecked ? (isCorrect ? 'correct' : 'incorrect') : ''}" style="display: ${isChecked ? 'block' : 'none'}">
                        <strong>${isCorrect ? 'Correct!' : 'Incorrect'}</strong>
                        <details class="explanation-details">
                            <summary>Explanation</summary>
                            <p>${step.explanation}</p>
                        </details>
                    </div>
                </div>
            `;

            const isLastStep = stepIdx === section.steps.length - 1;

            html += `
                <div class="nav-buttons">
                    <div>
                        ${stepIdx > 0 ? `<button class="nav-btn" onclick="navigateTo(${currentState.currentSectionIndex}, ${stepIdx - 1})"><i class="fas fa-arrow-left"></i> Back</button>` : ''}
                    </div>
                    <div style="display: flex; gap: 10px;">
                        ${isChecked ? `<button class="nav-btn reset-step-btn" onclick="resetStep('${ansKey}', '${section.id}', ${stepIdx})"><i class="fas fa-redo"></i> Reset</button>` : ''}
                        ${isLastStep ? 
                            `<button class="nav-btn" style="background-color: var(--warning); border-bottom-color: #cc9f00; color: black;" onclick="completeAssignment('${section.id}')"><i class="fas fa-print"></i> Print Result & Next</button>` :
                            `<button class="nav-btn" onclick="navigateTo(${currentState.currentSectionIndex}, ${stepIdx + 1})">Next <i class="fas fa-arrow-right"></i></button>`
                        }
                    </div>
                </div>
            `;

            area.innerHTML = html;
        }

        // --- LOGIC FUNCTIONS ---
        function handleInput(key, value) {
            currentState.answers[key] = value.trim();
            saveState();
        }

        function checkAnswer(userAns, correctAnswers) {
            if (!userAns) return false;
            // Normalisasi spasi: mengubah spasi ganda menjadi spasi tunggal
            const normalizedUserAns = userAns.replace(/\s+/g, ' ').trim().toLowerCase();
            return correctAnswers.some(ans => ans.replace(/\s+/g, ' ').trim().toLowerCase() === normalizedUserAns);
        }

        function checkStep(ansKey, sectionId, stepIdx) {
            const inputEl = document.getElementById(`input-${ansKey}`);
            if(!inputEl.value.trim()) return alert("Please fill in the answer first. / Silakan isi jawaban terlebih dahulu.");
            
            currentState.answers[ansKey] = inputEl.value.trim();
            saveState();
            renderContent();
        }

        function resetStep(ansKey, sectionId, stepIdx) {
            delete currentState.answers[ansKey];
            saveState();
            renderContent();
        }

        function completeSection(sectionId) {
            currentState.completedSteps[sectionId] = true;
            saveState();
            navigateTo(currentState.currentSectionIndex + 1, 0);
        }

        function completeAssignment(sectionId) {
            currentState.completedSteps[sectionId] = true;
            printAssignmentResult(sectionId);
            saveState();
            navigateTo(currentState.currentSectionIndex + 1, 0);
        }

        function printAssignmentResult(sectionId) {
            const section = lessonData.find(s => s.id === sectionId);
            let score = 0;
            let tableRows = '';

            section.steps.forEach((step, idx) => {
                const ansKey = `${section.id}_step${idx}`;
                const userAns = currentState.answers[ansKey] || '-';
                const isCorrect = checkAnswer(userAns, step.answer);
                if(isCorrect) score++;

                // Bersihkan tag HTML dari pertanyaan agar cetakannya rapi (tidak ada <span> dll)
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = step.question;
                const cleanQuestion = tempDiv.textContent || tempDiv.innerText || "";

                tableRows += `
                    <tr>
                        <td style="text-align:center; width:30px;">${idx+1}</td>
                        <td>${cleanQuestion}</td>
                        <td>${userAns}</td>
                        <td>${step.answer[0]}</td>
                        <td style="text-align:center;">${isCorrect ? '&#10004;' : '&#10008;'}</td>
                    </tr>
                `;
            });

            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <h2>MATH TUTORING by Deni</h2>
                <div class="print-info">
                    <strong>Name:</strong> _______________________<br>
                    <strong>Date:</strong> _______________________<br>
                    <strong>Topic:</strong> Introduction to Quadratic Equations<br>
                    <strong>Assignment Group:</strong> ${section.title}<br>
                    <strong>Score:</strong> ${score} / ${section.steps.length}
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Question</th>
                            <th>Student Answer</th>
                            <th>Correct Answer</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                <div class="print-footer">
                    <p>Checked by,</p>
                    <br><br>
                    <p><strong>Deni</strong></p>
                </div>
            `;

            // Render KaTeX di area cetak SEBELUM menampilkan dialog print
            renderMathInElement(printArea, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });

            setTimeout(() => {
                window.print();
            }, 600); // Delay sedikit lebih lama agar KaTeX selesai merender gambar matematika
        }

        // --- INITIALIZATION ---
        loadState();
        renderPath();
        renderContent();

    </script>
</body>
</html>
